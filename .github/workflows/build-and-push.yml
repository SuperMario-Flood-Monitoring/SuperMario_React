name: Build and Push Frontend Image

on:
  push:
    branches:
      - prod
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: supermario-flood-monitoring/supermario-react
  INFRA_REPOSITORY: SuperMario-Flood-Monitoring/SuperMario_Infra
  SERVICE_NAME: frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      INFRA_DISPATCH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=sha,format=long,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=SuperMario React frontend

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify infra repository
        if: ${{ env.INFRA_DISPATCH_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.INFRA_DISPATCH_TOKEN }}
          repository: ${{ env.INFRA_REPOSITORY }}
          event-type: service-image-published
          client-payload: >-
            {
              "service": "${{ env.SERVICE_NAME }}",
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
              "tag": "${{ github.sha }}",
              "source_repo": "${{ github.repository }}",
              "source_branch": "${{ github.ref_name }}",
              "source_sha": "${{ github.sha }}"
            }
